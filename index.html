const dateDiff = (a,b) => Math.floor((new Date(b)-new Date(a))/86400000);

function getAvgCycle(periods, user) {
  if (periods.length < 2) return parseInt(user?.cycleLen) || 28;
  const lens = [];
  for (let i = 1; i < periods.length; i++) lens.push(Math.round((new Date(periods[i].start) - new Date(periods[i-1].start)) / 86400000));
  return Math.round(lens.reduce((a,b) => a+b, 0) / lens.length);
}
function getAvgPeriodLen(periods) {
  if (!periods.length) return 0;
  return Math.round(periods.map(p => dateDiff(p.start,p.end)+1).reduce((a,b)=>a+b,0) / periods.length);
}
function getNextPeriodDate(periods, user) {
  if (!periods.length) return null;
  const last = periods[periods.length-1];
  return new Date(new Date(last.start).getTime() + getAvgCycle(periods, user)*86400000);
}
function getCurrentPhase(periods, user) {
  if (!periods.length) return 'Log your first period';
  const last = periods[periods.length-1];
  const avg = getAvgCycle(periods, user);
  const d = Math.floor((new Date() - new Date(last.start)) / 86400000);
  const cd = ((d % avg) + avg) % avg;
  const pl = dateDiff(last.start, last.end) + 1;
  if (cd < pl) return 'Menstrual Phase';
  if (cd < 13) return 'Follicular Phase';
  if (cd <= 15) return 'Ovulation Phase';
  if (cd >= avg - 5) return 'Luteal / PMS Phase';
  return 'Luteal Phase';
}
function getDayPhase(dateStr, periods, user) {
  for (const p of periods) {
    if (new Date(dateStr) >= new Date(p.start) && new Date(dateStr) <= new Date(p.end)) return 'period';
  }
  if (!periods.length) return null;
  const last = periods[periods.length-1];
  const avg = getAvgCycle(periods, user);
  const daysSince = Math.floor((new Date(dateStr) - new Date(last.start)) / 86400000);
  if (daysSince < 0) return null;
  const cd = daysSince % avg;
  const pl = dateDiff(last.start, last.end) + 1;
  if (cd < pl) return 'period';
  if (cd >= pl && cd < pl+5) return 'fertile';
  if (cd >= 13 && cd <= 15) return 'ovulation';
  if (cd >= avg-5) return 'pms';
  return null;
}

function LoginForm({ onLogin, onGoSignup }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  const handleSubmit = () => {
    if (!email || !password) { setError('Please fill in all fields.'); return; }
    const users = JSON.parse(localStorage.getItem('zh_users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);
    if (!user) { setError('Invalid email or password.'); return; }
    setError('');
    onLogin(user);
  };

  return (
    <section className="landing-section" id="login-form-section">
      <div className="section-inner narrow">
        <div className="section-tag">Welcome back</div>
        <h2 className="section-title">Sign in to ZenHer</h2>
        <div className="auth-card inline-card">
          <div className="form-group"><label>Email</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" /></div>
          <div className="form-group"><label>Password</label><input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e => e.key === 'Enter' && handleSubmit()} /></div>
          {error && <div className="auth-error">{error}</div>}
          <button className="btn-primary" onClick={handleSubmit}>Sign In</button>
          <p className="auth-switch">New here? <span onClick={onGoSignup}>Create an account</span></p>
        </div>
      </div>
    </section>
  );
}

function Calendar({ periods, user, onPeriodChange }) {
  const today = new Date();
  const [month, setMonth] = useState(today.getMonth());
  const [year, setYear] = useState(today.getFullYear());
  const [selectedDay, setSelectedDay] = useState(null);

  const next = getNextPeriodDate(periods, user);
  const daysLeft = next ? Math.ceil((next - new Date()) / 86400000) : null;

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();

  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const isPeriodDay = (ds) => periods.some(p => new Date(ds) >= new Date(p.start) && new Date(ds) <= new Date(p.end));

  const quickLog = (ds) => {
    const end = new Date(ds); end.setDate(end.getDate()+4);
    onPeriodChange([...periods, { start: ds, end: toDateStr(end), flow: 'medium' }]);
  };
  const removeDay = (ds) => {
    onPeriodChange(periods.filter(p => !(new Date(ds) >= new Date(p.start) && new Date(ds) <= new Date(p.end))));
    setSelectedDay(null);
  };

  const selDs = selectedDay ? `${year}-${String(month+1).padStart(2,'0')}-${String(selectedDay).padStart(2,'0')}` : null;
  const selPhase = selDs ? getDayPhase(selDs, periods, user) : null;
  const phaseLabels = { period:'Period day', fertile:'Fertile window', ovulation:'Ovulation', pms:'PMS zone' };
  const phaseInfo = { period:'Your body is shedding the uterine lining. Rest, warmth, and hydration help.', fertile:'Your estrogen is rising. You may feel more social and energetic.', ovulation:'Peak fertility! You may feel your best — confident, energetic, and social.', pms:'Progesterone is dropping. Be extra gentle with yourself.' };

  return (
    <div className="card calendar-card">
      <div className="card-header">
        <h3>Your Cycle Calendar</h3>
        <div className="calendar-nav">
          <button onClick={() => { if (month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); }}>‹</button>
          <span>{MONTH_NAMES[month]} {year}</span>
          <button onClick={() => { if (month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); }}>›</button>
        </div>
      </div>

      <div className="cycle-legend">
        <span><span className="dot period"></span> Period</span>
        <span><span className="dot fertile"></span> Fertile</span>
        <span><span className="dot ovulation"></span> Ovulation</span>
        <span><span className="dot pms"></span> PMS</span>
      </div>

      <div className="calendar-grid-wrap">
        <div className="cal-weekdays">
          {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <span key={d}>{d}</span>)}
        </div>
        <div className="calendar-grid">
          {cells.map((d, i) => {
            if (!d) return <div key={`e${i}`} className="cal-day empty"></div>;
            const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const phase = getDayPhase(ds, periods, user);
            const isToday = ds === toDateStr(today);
            const isSelected = d === selectedDay;
            return (
              <div key={ds}
                className={`cal-day ${phase ? 'phase-'+phase : ''} ${isToday ? 'today' : ''} ${isSelected ? 'selected-day' : ''}`}
                onClick={() => setSelectedDay(d === selectedDay ? null : d)}>
                {d}
              </div>
            );
          })}
        </div>
      </div>

      {selectedDay && selDs && (
        <div className="day-detail open">
          <div className="detail-header">
            <strong>{new Date(selDs+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</strong>
            <span className={`detail-phase ${selPhase||''}`}>{phaseLabels[selPhase] || 'Regular day'}</span>
          </div>
          {isPeriodDay(selDs)
            ? <div className="detail-period-tag">Period logged ✓ <button className="btn-sm" onClick={()=>removeDay(selDs)}>Remove</button></div>
            : <div className="detail-actions"><button className="btn-sm" onClick={()=>quickLog(selDs)}>Mark as Period Day</button></div>
          }
          {selPhase && <p style={{fontSize:'13px',color:'#C9A8B8',marginTop:'8px'}}>{phaseInfo[selPhase]}</p>}
        </div>
      )}

      <div className="period-countdown">
        {daysLeft === null ? null
          : daysLeft <= 0 ? <span className="countdown-badge period">Your period may have started</span>
          : daysLeft <= 10 ? <span className="countdown-badge warning">Period in <strong>{daysLeft}</strong> days</span>
          : <span className="countdown-badge calm">📅 Next period in <strong>{daysLeft}</strong> days</span>}
      </div>
    </div>
  );
}

function CycleChart({ periods }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    if (periods.length < 2) return;
    const lengths = [], labels = [];
    for (let i = 1; i < periods.length; i++) {
      lengths.push(Math.round((new Date(periods[i].start)-new Date(periods[i-1].start))/86400000));
      labels.push(formatDate(periods[i].start));
    }
    chartRef.current = new Chart(canvasRef.current, {
      type: 'line',
      data: { labels, datasets: [{ label:'Cycle Length (days)', data:lengths, borderColor:'#C0395F', backgroundColor:'rgba(192,57,95,0.12)', borderWidth:2.5, pointBackgroundColor:'#C0395F', pointRadius:5, fill:true, tension:0.4 }] },
      options: { responsive:true, plugins:{ legend:{ labels:{ font:{family:'Poppins',size:12}, color:'#8B2252' } } }, scales:{ x:{ticks:{font:{family:'Poppins',size:11},color:'#C9A8B8'},grid:{color:'rgba(192,57,95,0.08)'}}, y:{ticks:{font:{family:'Poppins',size:11},color:'#C9A8B8'},grid:{color:'rgba(192,57,95,0.08)'},min:20,max:40} } }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [periods]);

  if (periods.length < 2) {
    return <div style={{textAlign:'center',padding:'2rem',color:'#C9A8B8',fontSize:'14px'}}>Log 2+ periods to see your cycle chart</div>;
  }
  return <div className="cycle-chart-wrap"><canvas ref={canvasRef} height="160"></canvas></div>;
}

        </div>
        <div className="form-group"><label>Your message</label><textarea rows="4" placeholder="Write to us..."></textarea></div>
        <button className="btn-primary" onClick={() => { alert('Sent! 💌'); onClose(); }}>Send Message</button>
      </div>
    </div>
  );
}

function AppShell({ user, onLogout }) {
  const key = user.email;
  const load = (k) => JSON.parse(localStorage.getItem(k) || '[]');
  const [periods, setPeriods] = useState(() => load('zh_periods_'+key));
  const [symptoms, setSymptoms] = useState(() => load('zh_symptoms_'+key));
  const [moods, setMoods] = useState(() => load('zh_moods_'+key));
  const [activeTab, setActiveTab] = useState('home');
  const [showProfile, setShowProfile] = useState(false);
  const [showContact, setShowContact] = useState(false);

  const save = (storeKey, data) => localStorage.setItem(storeKey, JSON.stringify(data));

  const handlePeriods = (updated) => { setPeriods(updated); save('zh_periods_'+key, updated); };
  const handleSymptoms = (updated) => { setSymptoms(updated); save('zh_symptoms_'+key, updated); };
  const handleMood = (mood) => {
    const entry = { date: toDateStr(new Date()), mood: mood.id, emoji: mood.emoji, label: mood.label };
    const updated = [...moods, entry];
    setMoods(updated); save('zh_moods_'+key, updated);
  };

  const sidebarItems = [
    { id:'home', icon:'', label:'Home' },
    { id:'tracker', icon:'', label:'Period Log' },
    { id:'symptoms', icon:'', label:'Symptoms' },
    { id:'mood', icon:'', label:'Mood' },
    { id:'insights', icon:'', label:'Insights' },
    { id:'conditions', icon:'', label:'Health Hub' },
  ];

  return (
    <div className="app">
      <AppTopBar user={user} activeTab={activeTab} onTab={setActiveTab} onProfile={()=>setShowProfile(true)} onContact={()=>setShowContact(true)} onLogout={onLogout} />
      <div className="app-body">
        <nav className="sidebar">
          <ul className="nav-links">
            {sidebarItems.map(item => (
              <li key={item.id} className={activeTab===item.id?'active':''} onClick={()=>setActiveTab(item.id)}>
                <span className="nav-icon">{item.icon}</span><span>{item.label}</span>
              </li>
            ))}
          </ul>
          <div className="sidebar-bottom">
            <button className="btn-logout" onClick={()=>setShowProfile(true)}>👤 My Profile</button>
          </div>
        </nav>
        <main className="main-content">
          {activeTab === 'home'       && <HomeTab user={user} periods={periods} moods={moods} onPeriodChange={handlePeriods} onMoodLog={handleMood} />}
          {activeTab === 'tracker'    && <PeriodLogTab user={user} periods={periods} onPeriodChange={handlePeriods} />}
          {activeTab === 'symptoms'   && <SymptomsTab symptoms={symptoms} onSymptomsChange={handleSymptoms} />}
          {activeTab === 'mood'       && <MoodTab moods={moods} onMoodLog={handleMood} />}
          {activeTab === 'insights'   && <InsightsTab periods={periods} symptoms={symptoms} user={user} />}
          {activeTab === 'conditions' && <HealthHubTab user={user} />}
        </main>
      </div>
      {showProfile && <ProfileModal user={user} onClose={()=>setShowProfile(false)} onLogout={onLogout} />}
      {showContact && <ContactModal onClose={()=>setShowContact(false)} />}
    </div>
  );
}
function App() {
  const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('zh_current') || 'null'));
  const [page, setPage] = useState('landing'); 

  const handleLogin = (u) => {
    localStorage.setItem('zh_current', JSON.stringify(u));
    setUser(u);
  };
  const handleLogout = () => {
    localStorage.removeItem('zh_current');
    setUser(null);
    setPage('landing');
  };

  if (user) return <AppShell user={user} onLogout={handleLogout} />;

  if (page === 'signup') return (
    <>
      <SignupPage onLogin={handleLogin} onGoLogin={() => setPage('login')} />
    </>
  );
  return (
    <>
      <AuthNavbar onLogin={() => { setPage('landing'); setTimeout(()=>document.getElementById('login-form-section')?.scrollIntoView({behavior:'smooth'}),100); }} onSignup={() => setPage('signup')} />
      <div style={{paddingTop:'72px'}}>
        <LandingPage onGoSignup={() => setPage('signup')} onGoLogin={() => { setTimeout(()=>document.getElementById('login-form-section')?.scrollIntoView({behavior:'smooth'}),100); }} />
        <LoginForm onLogin={handleLogin} onGoSignup={() => setPage('signup')} />
      </div>
    </>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
